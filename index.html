<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리얼타임 출근 타이머 (KST 기준)</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 420px;
        }
        .badge {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin: 0 0 15px 0;
            font-weight: 500;
        }
        .time-picker-box {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .time-picker-box input {
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
        }
        .money-display {
            font-size: 38px;
            font-weight: 800;
            color: #1b5e20;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }
        .sub-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
        }
        .lunch-badge {
            font-size: 12px;
            color: #d32f2f;
            background-color: #ffebee;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .timer-display {
            font-size: 15px;
            color: #444;
            background: #edf2f7;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">지방 공기업 리얼타임 자산기 💼</div>
    <h1>오늘 출근 이후 벌어들인 돈</h1>
    
    <!-- 출근 시간 설정 UI -->
    <div class="time-picker-box">
        <label for="work-time">출근 시간 설정 :</label>
        <input type="time" id="work-time" value="09:00" onchange="initTimer()">
    </div>
    
    <!-- 현재까지 누적된 실시간 금액 -->
    <div class="money-display" id="money">0원</div>
    
    <div class="sub-text">숨만 쉬어도 초당 <span style="color:#2e7d32; font-weight:bold;">1.14원</span> 획득 중</div>
    
    <!-- 휴게 시간 알림 (점심/저녁) -->
    <div id="status-message" class="lunch-badge" style="display: none;">현재 무급 휴게 시간입니다 (타이머 일시정지)</div>
    
    <!-- 출근 후 경과 시간 -->
    <div class="timer-display" id="timer">실제 근무 시간: 00시간 00분 00초 째</div>
</div>

<script>
    // 유저님의 연간 세전 총액 기준 (36,019,720원)
    // 36,019,720원 / 365일 / 24시간 / 3600초 = 약 1.14217원 (초당 가치)
    const earningsPerSecond = 1.14217; 
    
    let targetTime = null;
    let startHour = 9;

    // 접속한 기기의 한국 시간(KST)을 가져오는 함수
    function getKSTDate() {
        const curr = new Date();
        const utc = curr.getTime() + (curr.getTimezoneOffset() * 60 * 1000);
        const KR_TIME_DIFF = 9 * 60 * 60 * 1000;
        return new Date(utc + KR_TIME_DIFF);
    }

    function initTimer() {
        const timeVal = document.getElementById('work-time').value; // "09:00" 형태
        const [hours, minutes] = timeVal.split(':');
        startHour = parseInt(hours);
        
        const now = getKSTDate();
        targetTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
    }

    function updateTimer() {
        if (!targetTime) return;

        const now = getKSTDate();
        let elapsedTimeInSeconds = (now - targetTime) / 1000;

        if (elapsedTimeInSeconds < 0) {
            elapsedTimeInSeconds = 0;
        }

        // 오늘 날짜의 무급 휴게시간 기준점 설정
        const lunchStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
        const lunchEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 13, 0, 0);
        const dinnerStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 0, 0);
        const dinnerEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 18, 0, 0);

        let penaltySeconds = 0;
        let isBreakTime = false;

        // 1. 오전 출근 (12시 이전 출근) -> 점심시간(12~13시) 무급 처리
        if (startHour < 12) {
            if (now >= lunchStart && now < lunchEnd) {
                // 현재 점심시간 진행 중인 경우 -> 12시 정각까지만 일한 것으로 고정
                penaltySeconds = (now - lunchStart) / 1000;
                isBreakTime = true;
            } else if (now >= lunchEnd) {
                // 점심시간이 완전히 지난 경우 -> 통째로 1시간(3600초) 차감
                penaltySeconds = 3600;
            }
        } 
        // 2. 오후 출근 (12시~17시 사이 출근) -> 저녁시간(17~18시) 무급 처리
        else if (startHour >= 12 && startHour < 17) {
            if (now >= dinnerStart && now < dinnerEnd) {
                // 현재 저녁시간 진행 중인 경우 -> 17시 정각까지만 일한 것으로 고정
                penaltySeconds = (now - dinnerStart) / 1000;
                isBreakTime = true;
            } else if (now >= dinnerEnd) {
                // 저녁시간이 완전히 지난 경우 -> 통째로 1시간(3600초) 차감
                penaltySeconds = 3600;
            }
        }

        // 전체 흐른 시간에서 무급 휴게 시간을 제외하여 실제 근무 시간 계산
        let realWorkingSeconds = elapsedTimeInSeconds - penaltySeconds;
        if (realWorkingSeconds < 0) realWorkingSeconds = 0;

        // UI 업데이트 (무급 시간 안내 배지)
        const statusMsg = document.getElementById('status-message');
        if (isBreakTime) {
            statusMsg.style.display = 'inline-block';
        } else {
            statusMsg.style.display = 'none';
        }

        // 1. 누적 금액 표시
        const accumulatedMoney = realWorkingSeconds * earningsPerSecond;
        document.getElementById('money').innerText = accumulatedMoney.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' 원';

        // 2. 실제 근무 시간 표시
        const hrs = Math.floor(realWorkingSeconds / 3600).toString().padStart(2, '0');
        const mins = Math.floor((realWorkingSeconds % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(realWorkingSeconds % 60).toString().padStart(2, '0');
        
        document.getElementById('timer').innerText = `실제 근무 시간: ${hrs}시간 ${mins}분 ${secs}초 째`;
    }

    // 초기 구동
    initTimer();
    setInterval(updateTimer, 100);
</script>

</body>
</html>
