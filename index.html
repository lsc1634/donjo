<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리얼타임 출근 타이머</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 400px;
        }
        .badge {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin: 0 0 15px 0;
            font-weight: 500;
        }
        .time-picker-box {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .time-picker-box input {
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
        }
        .money-display {
            font-size: 38px;
            font-weight: 800;
            color: #1b5e20;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }
        .sub-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 25px;
        }
        .timer-display {
            font-size: 15px;
            color: #444;
            background: #edf2f7;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">지방 공기업 리얼타임 자산기 💼</div>
    <h1>오늘 출근 이후 벌어들인 돈</h1>
    
    <!-- 출근 시간 설정 UI -->
    <div class="time-picker-box">
        <label for="work-time">출근 시간 설정 :</label>
        <input type="time" id="work-time" value="09:00" onchange="initTimer()">
    </div>
    
    <!-- 현재까지 누적된 실시간 금액 -->
    <div class="money-display" id="money">0원</div>
    
    <div class="sub-text">숨만 쉬어도 초당 <span style="color:#2e7d32; font-weight:bold;">1.14원</span> 획득 중</div>
    
    <!-- 출근 후 경과 시간 -->
    <div class="timer-display" id="timer">출근한 지: 00시간 00분 00초 째</div>
</div>

<script>
    // 유저님의 연간 세전 총액 기준 (36,019,720원)
    // 36,019,720원 / 365일 / 24시간 / 3600초 = 약 1.14217원 (초당 가치)
    const earningsPerSecond = 1.14217; 
    
    let targetTime = null;

    function initTimer() {
        const timeVal = document.getElementById('work-time').value; // "09:00" 형태
        const [hours, minutes] = timeVal.split(':');
        
        // 오늘 날짜의 해당 시간으로 Date 객체 생성
        const now = new Date();
        targetTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
    }

    function updateTimer() {
        if (!targetTime) return;

        const now = new Date();
        // 출근 시간과 현재 시간의 차이 (초 단위)
        let elapsedTimeInSeconds = (now - targetTime) / 1000;

        // 만약 설정한 출근 시간이 현재 시간보다 미래라면 0으로 처리
        if (elapsedTimeInSeconds < 0) {
            elapsedTimeInSeconds = 0;
        }

        // 1. 출근 이후 누적 금액 계산 및 표시
        const accumulatedMoney = elapsedTimeInSeconds * earningsPerSecond;
        document.getElementById('money').innerText = accumulatedMoney.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' 원';

        // 2. 출근 후 경과 시간 계산
        const hrs = Math.floor(elapsedTimeInSeconds / 3600).toString().padStart(2, '0');
        const mins = Math.floor((elapsedTimeInSeconds % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(elapsedTimeInSeconds % 60).toString().padStart(2, '0');
        
        document.getElementById('timer').innerText = `출근한 지: ${hrs}시간 ${mins}분 ${secs}초 째`;
    }

    // 페이지가 열릴 때 초기 세팅 및 타이머 구동
    initTimer();
    setInterval(updateTimer, 100);
</script>

</body>
</html>
