<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커리어 누적 자산 타이머</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 460px;
        }
        .badge {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin: 0 0 20px 0;
            font-weight: 500;
        }
        .setting-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 14px;
            color: #555;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .setting-row:last-child {
            margin-bottom: 0;
        }
        .setting-box input {
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
        }
        .salary-list {
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px dashed #ddd;
            margin-top: 10px;
            padding-top: 10px;
        }
        .salary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .salary-item input {
            text-align: right;
            width: 120px;
        }
        .money-display {
            font-size: 38px;
            font-weight: 800;
            color: #1b5e20;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            word-break: break-all;
        }
        .decimal-point {
            font-size: 22px;
            color: #81c784;
            font-weight: 500;
        }
        .sub-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
        .timer-display {
            font-size: 14px;
            color: #666;
            background: #edf2f7;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">실시간 회사 누적 자산 트래커 💼</div>
    <h1>입사 이후 내가 총 벌어들인 돈</h1>
    
    <div class="setting-box">
        <div class="setting-row">
            <label for="start-date">🗓 입사 연/월/일 설정:</label>
            <input type="date" id="start-date" value="2024-01-01" onchange="onStartDateChange()">
        </div>
        
        <div id="salary-list" class="salary-list">
            </div>
    </div>
    
    <div class="money-display" id="money">0원</div>
    
    <div class="sub-text">현재 연봉 기준 초당 <span id="per-second-text" style="color:#2e7d32; font-weight:bold;">0.00원</span> 상승 중</div>
    
    <div class="timer-display" id="timer">
        내 커리어 총 경과 시간 계산 중...
    </div>
</div>

<script>
    function getKSTDate() {
        const curr = new Date();
        const utc = curr.getTime() + (curr.getTimezoneOffset() * 60 * 1000);
        const KR_TIME_DIFF = 9 * 60 * 60 * 1000;
        return new Date(utc + KR_TIME_DIFF);
    }

    const SECONDS_PER_YEAR = 31536000;

    window.onload = function() {
        const savedStartDate = localStorage.getItem('careerStartDateDay') || '2024-01-01';
        document.getElementById('start-date').value = savedStartDate;

        renderSalaryInputs();
        setInterval(updateTimer, 100);
    };

    function onStartDateChange() {
        const startDateVal = document.getElementById('start-date').value;
        localStorage.setItem('careerStartDateDay', startDateVal);
        renderSalaryInputs();
    }

    function renderSalaryInputs() {
        const startDateVal = document.getElementById('start-date').value;
        if (!startDateVal) return;

        const startYear = parseInt(startDateVal.split('-')[0]);
        const currentYear = getKSTDate().getFullYear();
        const container = document.getElementById('salary-list');
        container.innerHTML = '';

        let savedSalaries = JSON.parse(localStorage.getItem('careerSalariesDay')) || {};

        for (let y = startYear; y <= currentYear; y++) {
            if (savedSalaries[y] === undefined) {
                savedSalaries[y] = 36020000; 
            }

            const item = document.createElement('div');
            item.className = 'salary-item';
            item.innerHTML = `
                <label>💰 ${y}년 세전 연봉:</label>
                <div>
                    <input type="number" id="salary-${y}" value="${savedSalaries[y]}" step="10000" oninput="saveSalaries()">
                    <span>원</span>
                </div>
            `;
            container.appendChild(item);
        }
        localStorage.setItem('careerSalariesDay', JSON.stringify(savedSalaries));
    }

    function saveSalaries() {
        const startDateVal = document.getElementById('start-date').value;
        if (!startDateVal) return;

        const startYear = parseInt(startDateVal.split('-')[0]);
        const currentYear = getKSTDate().getFullYear();
        let salaries = {};

        for (let y = startYear; y <= currentYear; y++) {
            const val = document.getElementById(`salary-${y}`).value;
            salaries[y] = parseFloat(val) || 0;
        }

        localStorage.setItem('careerSalariesDay', JSON.stringify(salaries));
    }

    function updateTimer() {
        const startDateVal = document.getElementById('start-date').value;
        if (!startDateVal) return;

        const [startYearStr, startMonthStr, startDayStr] = startDateVal.split('-');
        const startYear = parseInt(startYearStr);
        const startMonth = parseInt(startMonthStr);
        const startDay = parseInt(startDayStr);

        const now = getKSTDate();
        const currentYear = now.getFullYear();

        const careerStart = new Date(startYear, startMonth - 1, startDay, 0, 0, 0);
        
        if (now < careerStart) {
            document.getElementById('money').innerHTML = '0<span class="decimal-point">.00</span> 원';
            document.getElementById('timer').innerText = '입사일이 현재보다 미래입니다.';
            return;
        }

        const salaries = JSON.parse(localStorage.getItem('careerSalariesDay')) || {};
        let totalEarned = 0;

        for (let y = startYear; y < currentYear; y++) {
            const annualSalary = salaries[y] || 0;

            if (y === startYear) {
                const yearStart = new Date(y, 0, 1, 0, 0, 0);
                const yearEnd = new Date(y, 11, 31, 23, 59, 59);
                const totalSecsInYear = (yearEnd - yearStart) / 1000;
                const workedSecsInFirstYear = (yearEnd - careerStart) / 1000;
                
                totalEarned += (annualSalary / totalSecsInYear) * workedSecsInFirstYear;
            } else {
                totalEarned += annualSalary;
            }
        }

        const currentYearSalary = salaries[currentYear] || 0;
        const currentYearStart = new Date(currentYear, 0, 1, 0, 0, 0);
        
        const thisYearBasis = (startYear === currentYear) ? careerStart : currentYearStart;
        const thisYearElapsedSeconds = (now - thisYearBasis) / 1000;
        
        const currentEarningsPerSecond = currentYearSalary / SECONDS_PER_YEAR;
        totalEarned += thisYearElapsedSeconds * currentEarningsPerSecond;

        const formattedNum = totalEarned.toFixed(2);
        const [integerPart, decimalPart] = formattedNum.split('.');
        const commaInteger = parseInt(integerPart).toLocaleString('ko-KR');
        
        document.getElementById('money').innerHTML = `${commaInteger}<span class="decimal-point">.${decimalPart}</span> 원`;
        document.getElementById('per-second-text').innerText = currentEarningsPerSecond.toFixed(4) + '원';

        const totalElapsedSeconds = (now - careerStart) / 1000;
        const days = Math.floor(totalElapsedSeconds / 86400);
        const hrs = Math.floor((totalElapsedSeconds % 86400) / 3600).toString().padStart(2, '0');
        const mins = Math.floor((totalElapsedSeconds % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(totalElapsedSeconds % 60).toString().padStart(2, '0');

        // 하단 안내 문구도 '회사 근속'으로 정돈
        document.getElementById('timer').innerHTML = `회사 근속 기간: ${days}일 ${hrs}시간 ${mins}분 ${secs}초째<br>(${startYear}년 ${startMonth}월 ${startDay}일 기준)`;
    }
</script>

</body>
</html>
