<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리얼타임 라이프 자산 타이머</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 440px;
        }
        .badge {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin: 0 0 15px 0;
            font-weight: 500;
        }
        .input-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-box input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            text-align: right;
            width: 140px;
        }
        .money-display {
            font-size: 38px;
            font-weight: 800;
            color: #1b5e20;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }
        .sub-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
        .timer-display {
            font-size: 14px;
            color: #666;
            background: #edf2f7;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">실시간 라이프 자산 타이머 ⏳</div>
    <h1 id="title-year">올해 내가 살아가며 벌고 있는 돈</h1>
    
    <div class="input-box">
        <div class="input-row">
            <label for="salary-input">나의 세전 연봉 :</label>
            <input type="number" id="salary-input" value="36020000" step="10000" oninput="saveAndCalculate()">
            <span>원</span>
        </div>
    </div>
    
    <div class="money-display" id="money">0원</div>
    
    <div class="sub-text">숨만 쉬어도 초당 <span id="per-second-text" style="color:#2e7d32; font-weight:bold;">0.00원</span> 축적 중</div>
    
    <div class="timer-display" id="timer">
        올해 경과 시간: 00일 00시간 00분 00초<br>
        (1월 1일 00:00:00 기준)
    </div>
</div>

<script>
    let earningsPerSecond = 0;

    // 브라우저의 한국 시간(KST)을 계산하는 함수
    function getKSTDate() {
        const curr = new Date();
        const utc = curr.getTime() + (curr.getTimezoneOffset() * 60 * 1000);
        const KR_TIME_DIFF = 9 * 60 * 60 * 1000;
        return new Date(utc + KR_TIME_DIFF);
    }

    // 데이터를 저장하고 초당 가치를 재계산하는 함수
    function saveAndCalculate() {
        const salaryInput = document.getElementById('salary-input').value;
        const salary = parseFloat(salaryInput) || 0;
        
        // 로컬 스토리지에 연봉 저장 (킵 기능)
        localStorage.setItem('userSalary', salary);

        // 365일 24시간 기준 초당 가치 계산 (윤년 고려 없이 365일 기준)
        // 365일 * 24시간 * 60분 * 60초 = 31,536,000초
        earningsPerSecond = salary / 31536000;

        // 안내 텍스트 업데이트
        document.getElementById('per-second-text').innerText = earningsPerSecond.toFixed(4) + '원';
    }

    // 처음에 저장된 연봉 불러오기
    function loadSavedSalary() {
        const savedSalary = localStorage.getItem('userSalary');
        if (savedSalary !== null) {
            document.getElementById('salary-input').value = savedSalary;
        }
        saveAndCalculate();
    }

    function updateTimer() {
        const now = getKSTDate();
        const currentYear = now.getFullYear();
        
        // 제목에 현재 연도 표시
        document.getElementById('title-year').innerText = `${currentYear}년 내가 살아가며 벌고 있는 돈`;

        // 올해 1월 1일 00:00:00 KST 기준점 설정
        const startOfYear = new Date(currentYear, 0, 1, 0, 0, 0);
        
        // 올해 1월 1일부터 지금까지 흐른 총 시간 (초 단위)
        const elapsedTimeInSeconds = (now - startOfYear) / 1000;

        // 1. 올해 시작 이후 실시간 누적 금액 계산
        const accumulatedMoney = elapsedTimeInSeconds * earningsPerSecond;
        document.getElementById('money').innerText = accumulatedMoney.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' 원';

        // 2. 올해 경과 시간 포맷팅
        const days = Math.floor(elapsedTimeInSeconds / 86400);
        const hrs = Math.floor((elapsedTimeInSeconds % 86400) / 3600).toString().padStart(2, '0');
        const mins = Math.floor((elapsedTimeInSeconds % 3600) / 60).toString().padStart(2, '0');
        const secs = Math.floor(elapsedTimeInSeconds % 60).toString().padStart(2, '0');
        
        document.getElementById('timer').innerHTML = `올해 경과 시간: ${days}일 ${hrs}시간 ${mins}분 ${secs}초째<br>(1월 1일 00:00:00 기준)`;
    }

    // 초기화 및 루프 구동
    loadSavedSalary();
    setInterval(updateTimer, 100);
</script>

</body>
</html>
